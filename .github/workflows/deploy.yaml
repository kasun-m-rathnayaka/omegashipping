name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger cPanel Git Deploy via API
        run: |
          HTTP_CODE=$(curl -sk -o response.json -w "%{http_code}" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControl/update?repository_root=/home/hnykq8yljshb/public_html")
          echo "HTTP Status: $HTTP_CODE"
          echo "Response:"
          cat response.json

      - name: Check deploy result
        run: |
          if grep -q '"status":1' response.json; then
            echo "✅ Deploy successful"
          else
            echo "❌ Deploy failed"
            cat response.json
            exit 1
          fi